name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 👇 1. التعديل الأول: الدخول لمجلد الفرونت إند قبل البناء
      - run: cd admin-frontend && npm install && npm run build
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HAMA_CHAMBER }}
          projectId: hama-chamber
          channelId: live
          # 👇 2. التعديل الثاني: إخبار فايربيز أن إعداداته داخل هذا المجلد
          entryPoint: ./admin-frontend
